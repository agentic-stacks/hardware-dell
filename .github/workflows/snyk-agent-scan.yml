name: Snyk Agent Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Scan skills for security issues
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build skills directory for agent-scan discovery
        run: |
          pip install pyyaml
          python3 -c "
          import yaml, os, shutil

          with open('stack.yaml') as f:
              stack = yaml.safe_load(f)

          skills_dir = os.path.expanduser('~/.claude/skills')
          os.makedirs(skills_dir, exist_ok=True)

          for skill in stack.get('skills', []):
              name = skill['name']
              entry = skill['entry']
              desc = skill['description']
              readme = os.path.join(entry, 'README.md')
              if not os.path.isfile(readme):
                  print(f'WARN: {readme} not found, skipping {name}')
                  continue

              with open(readme) as f:
                  content = f.read()

              target_dir = os.path.join(skills_dir, name)
              os.makedirs(target_dir, exist_ok=True)

              skill_md = f'---\nname: {name}\ndescription: {desc}\n---\n\n{content}'
              with open(os.path.join(target_dir, 'SKILL.md'), 'w') as f:
                  f.write(skill_md)

              # Copy any other .md files from the skill directory
              for fname in os.listdir(entry):
                  if fname.lower() != 'readme.md' and fname.endswith('.md'):
                      shutil.copy2(os.path.join(entry, fname), target_dir)

              print(f'OK: {name} -> {target_dir}')

          print(f'\nTotal: {len(os.listdir(skills_dir))} skills prepared')
          "

      - name: Run Snyk Agent Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: uvx snyk-agent-scan@latest --skills --json > scan-results.json

      - name: Display results
        if: always()
        run: cat scan-results.json | python3 -m json.tool

      - name: Check for critical findings
        if: always()
        run: |
          python3 -c "
          import json, sys

          # Codes expected for hardware management stacks - don't fail on these
          ALLOWED_CODES = {
              'W007',  # Credential handling - racadm requires -p flag
              'W012',  # External URLs - Dell download servers
              'W013',  # System modification - the whole point of the stack
          }

          with open('scan-results.json') as f:
              data = json.load(f)

          blocking = []
          for client_key, client_data in data.items():
              for issue in client_data.get('issues', []):
                  code = issue.get('code', '')
                  if code not in ALLOWED_CODES:
                      blocking.append(issue)

          if blocking:
              print(f'::error::Found {len(blocking)} blocking issue(s):')
              for issue in blocking:
                  print(f'  [{issue[\"code\"]}] {issue[\"message\"][:120]}')
              sys.exit(1)
          else:
              total = sum(len(c.get('issues', [])) for c in data.values())
              allowed = total - len(blocking)
              print(f'No blocking issues. {allowed} accepted finding(s) in allowed categories.')
          "

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-agent-scan-results
          path: scan-results.json

name: Snyk Agent Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Scan skills for security issues
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run Snyk Agent Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: uvx snyk-agent-scan@latest --skills --json skills/ > scan-results.json

      - name: Display results
        if: always()
        run: cat scan-results.json | python3 -m json.tool

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-agent-scan-results
          path: scan-results.json

name: Snyk Agent Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Scan skills for security issues
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Claude Code skill config for discovery
        run: |
          mkdir -p ~/.claude/skills
          for skill in $(find skills -name "README.md" -not -path "skills/README.md"); do
            dir=$(dirname "$skill")
            name=$(basename "$dir")
            ln -s "$PWD/$skill" ~/.claude/skills/"$name".md
          done
          ls -la ~/.claude/skills/

      - name: Run Snyk Agent Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: uvx snyk-agent-scan@latest --skills --ci --json > scan-results.json

      - name: Display results
        if: always()
        run: cat scan-results.json | python3 -m json.tool

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-agent-scan-results
          path: scan-results.json

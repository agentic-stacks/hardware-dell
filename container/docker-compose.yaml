services:
  dell-tools:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROCKY_VERSION: ${ROCKY_VERSION:-9}
    image: hardware-dell-tools:rocky${ROCKY_VERSION:-9}
    container_name: dell-tools
    # Privileged mode is REQUIRED for local hardware access.
    # racadm local, perccli64, mvcli, dmidecode, and ipmitool all need
    # direct access to /dev and /sys devices to communicate with the BMC
    # and storage controllers. The entrypoint starts instsvcdrv-helper
    # which loads the kernel modules for iDRAC communication.
    privileged: true
    network_mode: host
    volumes:
      # Mount operator workspace for config import/export
      - ../workspace:/workspace
      # Pass through host hardware info — read-write needed for instsvcdrv-helper
      - /dev:/dev
      - /sys:/sys:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - IDRAC_HOST=${IDRAC_HOST:-}
      - IDRAC_USER=${IDRAC_USER:-root}
      - IDRAC_PASS=${IDRAC_PASS:-}
    stdin_open: true
    tty: true

  # Lightweight variant for remote-only management (no privileged mode)
  dell-tools-remote:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROCKY_VERSION: ${ROCKY_VERSION:-9}
    image: hardware-dell-tools:rocky${ROCKY_VERSION:-9}
    container_name: dell-tools-remote
    volumes:
      - ../workspace:/workspace
    environment:
      - IDRAC_HOST=${IDRAC_HOST:-}
      - IDRAC_USER=${IDRAC_USER:-root}
      - IDRAC_PASS=${IDRAC_PASS:-}
    stdin_open: true
    tty: true
    profiles:
      - remote
